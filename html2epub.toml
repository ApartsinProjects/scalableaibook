[book]
title = "Building Scalable AI"
subtitle = "From Big Data Algorithms to Distributed Intelligence"
language = "en"
identifier = "urn:uuid:building-scalable-ai-2026-first-edition"
publisher = "Alexander Apartsin & Yehudit Aperstein"
rights = "Copyright (c) 2026 Alexander Apartsin & Yehudit Aperstein. All rights reserved."
publication_date = "2026-06-17"
description = """Building Scalable AI is a graduate textbook on building artificial intelligence that runs across many machines. It leads with scale-out, distributing data, training, models, inference, cluster coordination, and decision-making across a fleet, and treats single-node efficiency as a clearly labeled per-node prerequisite. Across forty-one chapters and eight parts, it develops the six axes of distribution through foundations (distributed systems, communication primitives, performance models, evaluation), distributed data processing, distributed machine learning, parallel deep learning and large-model training, distributed inference and serving, multi-agent systems, cluster and edge infrastructure, and reliability and security. Five end-to-end case studies (web-scale RAG, federated medical AI, distributed recommendation, multi-agent robotics, and agentic LLM applications) and a capstone-design playbook turn the ideas into systems. Every chapter pairs intuition-building illustrations and runnable, verified code with the engineering discipline of baselines, speedup and efficiency metrics, cost analysis, and reproducibility. Written for graduate students and practitioners who need to move beyond one machine."""
keywords = [
  "distributed machine learning systems",
  "scale out AI distributed training",
  "parallel deep learning data model parallelism",
  "distributed LLM serving inference vLLM",
  "federated learning and edge AI",
  "MapReduce Spark Ray Kubernetes for AI",
  "multi-agent systems and RAG at scale",
]

[[book.authors]]
name = "Alexander Apartsin"
file_as = "Apartsin, Alexander"
role = "aut"

[[book.authors]]
name = "Yehudit Aperstein"
file_as = "Aperstein, Yehudit"
role = "aut"

[content]
source_dir = "."
spine = "auto"
front_matter_dir = "front-matter"
parts_glob = "part-*"
module_glob = "module-*"
appendices_dir = "appendices"
section_glob = "section-*.html"

[styling]
stylesheets = ["styles/book.css"]

[fonts]
include = []
rewrite_katex_to_woff2_only = false

[math]
render = "katex"
node_exe = "node"
katex_path = "E:/Projects/claude-skills/html2doc/node_modules"

[images]
max_side = 1400
jpeg_quality = 82
compress_pngs = true

[cover]
path = "_illustrations/cover_kdp.jpg"

[transforms]
wide_table_min_cols = 6
slim_index_lists = false
drop_inline_style_over = 1500
drop_selectors = ["script[src*='analytics']"]

[output]
epub = "KDP/output/building-scalable-ai.epub"

[optimize]
repair_entities = true

name: Build VisionBook APK

on:
  push:
    tags:
      - "visionbook-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visionbook-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visionbook-app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: npm run build:android

      - name: Copy APK
        run: npm run copy:apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: visionbook-apk
          path: visionbook-app/visionbook.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VisionBook APK ${{ github.ref_name }}
          files: visionbook-app/visionbook.apk
